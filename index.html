<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Todo App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      background: #f4f4f4;
      padding: 20px;
    }
    h1 { text-align: center; color: #333; }
    input {
      width: 75%;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    ul { list-style: none; padding: 0; margin-top: 20px; }
    li {
      background: white;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 4px;
    }
    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>✅ My Todo List</h1>
  <input type="text" id="todoInput" placeholder="Enter a task..." />
  <button onclick="addTodo()">Add</button>
  <ul id="todoList"></ul>

  <script src="app.js"></script>
</body>
</html>
